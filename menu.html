<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Menu - Bun &amp; Blaze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #C8102E;
      --mustard: #F2B705;
      --char: #1C1C1C;
      --cream: #FFF8E7;
      --brown: #3B2A22;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Archivo', sans-serif;
      background: var(--cream);
      color: var(--char);
    }

    /* TOP BAR */
    .top-bar {
      background: var(--char);
      border-bottom: 4px solid var(--mustard);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar .logo {
      color: var(--cream);
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      text-decoration: none;
      flex: 1;
    }
    .btn {
      display: inline-block;
      padding: 9px 18px;
      background: var(--red);
      color: var(--cream);
      border: none;
      border-radius: 4px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--mustard); color: var(--char); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--cream);
      color: var(--cream);
    }
    .btn-outline:hover { background: var(--cream); color: var(--char); }

    /* MAIN CONTENT */
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 28px;
      min-height: calc(100vh - 72px);
    }
    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 40px;
      color: var(--char);
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 15px;
    }

    /* MENU GRID */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      margin-bottom: 20px;
    }
    .card {
      background: #fff;
      border: 2px solid var(--char);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 16px; }
    .card-body h3 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 17px;
      margin-bottom: 6px;
    }
    .card-body p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 14px; min-height: 40px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .price {
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      color: var(--red);
    }
    .add-btn {
      background: var(--red);
      color: var(--cream);
      border: none;
      border-radius: 4px;
      padding: 7px 13px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-btn:hover { background: var(--mustard); color: var(--char); }

    /* CART SIDEBAR */
    #cartSidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100vh;
      background: var(--char);
      color: var(--cream);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 300;
      overflow-y: auto;
    }
    body.cart-open #cartSidebar { right: 0; }
    #cartSidebar h2 {
      font-family: 'Archivo Black', sans-serif;
      color: var(--mustard);
      margin-bottom: 16px;
      font-size: 20px;
    }
    #cartItems { list-style: none; }
    .cart-total-line {
      margin-top: 16px;
      font-weight: 700;
      color: var(--mustard);
      font-size: 16px;
      border-top: 1px solid #333;
      padding-top: 12px;
    }

    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="bun-and-blaze.html" class="logo">🔥 BUN &amp; BLAZE</a>
  <button id="backBtn" class="btn btn-outline">← Back</button>
  <a href="order.html" class="btn">Order Now</a>
  <button id="cartToggle" class="btn btn-outline">🛒 Cart</button>
</div>

<div class="wrap">
  <h1>Full Menu</h1>
  <p class="subtitle">Sab items dekho aur apni pasand cart mein add karo.</p>
  <div id="menuContainer"></div>
</div>

<div id="cartSidebar">
  <h2>🛒 Cart</h2>
  <ul id="cartItems"></ul>
  <div class="cart-total-line">Total: $<span id="cartTotal">0.00</span></div>
  <br>
  <button id="confirmCartBtn" class="btn" style="display:block;text-align:center;margin-top:10px;width:100%;background:#2a7a2a;">✅ Confirm Order</button>
  <a href="order.html" class="btn" style="display:block;text-align:center;margin-top:8px;background:#C8102E;">Edit Order</a>
  <button onclick="document.body.classList.remove('cart-open')" class="btn" style="width:100%;margin-top:8px;background:#444;">Close</button>
</div>

<script src="menu.js"></script>
</body>
</html>
