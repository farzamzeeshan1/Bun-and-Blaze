<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt - Bun &amp; Blaze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    /* WRAP */
    .wrap {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 28px;
    }

    /* RECEIPT CARD */
    .receipt-card {
      background: #fff;
      border: 3px solid var(--char);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 6px 6px 0 var(--mustard);
    }
    .receipt-header {
      text-align: center;
      margin-bottom: 28px;
      border-bottom: 2px dashed #ddd;
      padding-bottom: 20px;
    }
    .receipt-header h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      color: var(--red);
      margin-bottom: 4px;
    }
    .receipt-header .brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--char);
    }
    .receipt-header .timestamp {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    th {
      background: var(--mustard);
      color: var(--char);
      font-family: 'Archivo Black', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: none; }

    .totals {
      border-top: 2px solid var(--char);
      padding-top: 16px;
      margin-top: 8px;
    }
    .totals .row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 15px;
    }
    .totals .row.grand {
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      color: var(--red);
      border-top: 2px dashed #ddd;
      margin-top: 8px;
      padding-top: 12px;
    }

    .thank-you {
      text-align: center;
      margin-top: 24px;
      padding: 16px;
      background: var(--char);
      color: var(--cream);
      border-radius: 6px;
      font-family: 'Archivo Black', sans-serif;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .no-order {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .no-order h2 { font-size: 24px; margin-bottom: 12px; color: var(--char); }

    .order-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: var(--cream);
      border: 2px dashed var(--mustard);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .order-meta .oid { font-family: 'Archivo Black', sans-serif; color: var(--red); }
    .status-badge {
      display: inline-block;
      background: #2a7a2a;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .tracker {
      background: var(--char);
      color: var(--cream);
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .tracker .eta-label { font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 0.05em; }
    .tracker .eta-time { font-family: 'Archivo Black', sans-serif; font-size: 26px; color: var(--mustard); margin: 4px 0 10px; }
    .tracker-bar { height: 8px; background: #333; border-radius: 6px; overflow: hidden; }
    .tracker-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--mustard)); width: 4%; transition: width 1s linear; }
    .tracker-steps { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
    .tracker-steps span.active { color: var(--mustard); font-weight: 700; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="bun-and-blaze.html" class="logo">🔥 BUN &amp; BLAZE</a>
  <div id="authWidget"></div>
  <a href="bun-and-blaze.html" class="btn btn-outline">🏠 Home</a>
  <a href="order.html" class="btn btn-outline">New Order</a>
</div>

<div class="wrap">
  <div class="receipt-card" id="receiptCard">
    <div class="receipt-header">
      <div class="brand">🔥 BUN &amp; BLAZE</div>
      <h1>Receipt</h1>
      <div class="timestamp" id="orderTime"></div>
    </div>

    <div id="receiptContent">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<script src="account.js"></script>
<script>
  const orderData = JSON.parse(sessionStorage.getItem('orderData') || 'null');
  const session   = window.BB ? window.BB.getSession() : null;

  if (!orderData || !orderData.items || orderData.items.length === 0) {
    // No order data — redirect to home
    document.querySelector('.receipt-card').innerHTML = `
      <div class="no-order">
        <h2>No order found.</h2>
        <p>Please place an order first.</p>
        <br>
        <a href="order.html" class="btn" style="margin-top:16px;">Place an Order</a>
      </div>`;
  } else {
    // Timestamp
    const ts = new Date(orderData.timestamp);
    document.getElementById('orderTime').textContent =
      ts.toLocaleDateString('en-PK', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) +
      ' at ' + ts.toLocaleTimeString('en-PK', { hour:'2-digit', minute:'2-digit' });

    // Table
    let rowsHTML = '';
    orderData.items.forEach(item => {
      const lineTotal = (item.price * item.qty).toFixed(2);
      rowsHTML += `<tr>
        <td>${item.name}</td>
        <td>${item.qty}</td>
        <td>$${item.price.toFixed(2)}</td>
        <td><strong>$${lineTotal}</strong></td>
      </tr>`;
    });

    const eta = orderData.eta || 15;
    const readyBy = new Date(ts.getTime() + eta * 60000);
    const readyByStr = readyBy.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' });
    const greeting = session ? `Thanks, ${window.BB.escapeHTML(session.name.split(' ')[0])}! ` : 'Thank you! ';

    document.getElementById('receiptContent').innerHTML = `
      <div class="order-meta">
        <div>Order <span class="oid">#${orderData.id || 'BB-00000'}</span></div>
        <span class="status-badge">${orderData.status || 'Confirmed'}</span>
      </div>

      <div class="tracker">
        <div class="eta-label">Estimated ready by</div>
        <div class="eta-time">${readyByStr} <span style="font-size:14px;color:#aaa;font-family:'Archivo';">(~<span id="etaMins">${eta}</span> min)</span></div>
        <div class="tracker-bar"><div class="tracker-bar-fill" id="trackerFill"></div></div>
        <div class="tracker-steps">
          <span class="active" id="stepReceived">Received</span>
          <span id="stepKitchen">In the Kitchen</span>
          <span id="stepGrill">On the Grill</span>
          <span id="stepReady">Ready</span>
        </div>
      </div>

      <table>
        <thead>
          <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
        </thead>
        <tbody>${rowsHTML}</tbody>
      </table>
      <div class="totals">
        <div class="row"><span>Subtotal</span><span>$${orderData.subtotal.toFixed(2)}</span></div>
        <div class="row"><span>Tax (7%)</span><span>$${orderData.tax.toFixed(2)}</span></div>
        <div class="row grand"><span>Grand Total</span><span>$${orderData.total.toFixed(2)}</span></div>
      </div>
      <div class="thank-you">🙏 ${greeting}Your order has been placed.</div>
      <div class="actions">
        <a href="bun-and-blaze.html" class="btn">🏠 Go Home</a>
        <a href="order.html" class="btn" style="background:#444;">New Order</a>
        <a href="account.html" class="btn" style="background:#1D5C9E;">📋 My Orders</a>
        <button onclick="window.print()" class="btn" style="background:#2a7a2a;">🖨 Print</button>
      </div>`;

    // Fake live progress animation for the order tracker
    (function animateTracker() {
      const fill = document.getElementById('trackerFill');
      const steps = ['stepReceived', 'stepKitchen', 'stepGrill', 'stepReady'];
      let step = 0;
      fill.style.width = '4%';
      const timer = setInterval(() => {
        step++;
        if (step >= steps.length) { clearInterval(timer); return; }
        document.getElementById(steps[step]).classList.add('active');
        fill.style.width = `${(step / (steps.length - 1)) * 100}%`;
      }, 3200);
    })();
  }
</script>
</body>
</html>
